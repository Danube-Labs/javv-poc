<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>javv - vulnerability viewer</title>
<link rel="icon" href="branding/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{
  --slate:#16232F; --slate2:#21384A; --slate3:#2C4257;
  --bg:#F4F1EA; --card:#FFFFFF; --panel:#FBFAF6;
  --line:#E7E0D3; --line2:#F0EBE0;
  --ink:#1B2935; --soft:#64727C; --muted:#9AA3AA;
  --coral:#EC7E54; --amber:#F4A368; --coral-d:#D96A41;
  --teal:#1F8E84;
  --r:12px; --r-sm:8px;
  --shadow:0 1px 2px rgba(22,35,47,.04), 0 8px 24px -18px rgba(22,35,47,.28);
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--bg); color:var(--ink);
  font-family:"Space Grotesk",system-ui,sans-serif;
  font-size:13px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
#root{height:100%;}
.mono-cell,.mono{font-family:"Space Mono",monospace;}
button{font-family:inherit;cursor:pointer;}
h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.01em;}
.muted{color:var(--muted);}
.muted-dash{color:#C3CAD0;}
.r{text-align:right;} .c{text-align:center;}
.strong{font-weight:600;}
.sm{font-size:11px;}

/* ---------- layout ---------- */
.app{display:flex;height:100%;overflow:hidden;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.content{flex:1;overflow-y:auto;padding:22px 26px 60px;}
.screen{max-width:1380px;margin:0 auto;}

/* ---------- sidebar ---------- */
.sidebar{width:226px;flex:none;background:var(--slate);color:#C7D0D8;display:flex;flex-direction:column;padding:16px 14px;}
.side-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;cursor:pointer;}
.side-word{display:flex;flex-direction:column;line-height:1.1;}
.side-word b{font-size:21px;color:#F3EEE6;letter-spacing:-.03em;}
.side-word span{font-family:"Space Mono",monospace;font-size:9.5px;color:#6E7C86;letter-spacing:.04em;margin-top:2px;}
.side-nav{flex:1;overflow-y:auto;}
.side-group{margin-bottom:18px;}
.side-group-label{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#5C6975;padding:0 10px 8px;}
.side-item{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;color:#AEB9C2;
  padding:9px 10px;border-radius:9px;font-size:13.5px;text-align:left;transition:color .12s;position:relative;}
.side-item:hover{background:rgba(255,255,255,.05);color:#E4EAEF;}
.side-on{background:rgba(236,126,84,.14);color:#FBE6D8;}
.side-on::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--coral);}
.side-on svg{color:var(--amber);}
.side-foot{border-top:1px solid rgba(255,255,255,.07);padding-top:14px;margin-top:8px;}
.sweep{display:flex;align-items:center;gap:10px;font-size:11px;color:#9AA6AF;}
.sweep div{display:flex;flex-direction:column;line-height:1.3;}
.sweep b{color:#CFE3D8;font-size:11.5px;font-weight:500;}
.sweep span{color:#5F6D78;font-size:10px;font-family:"Space Mono",monospace;}
.sweep-dot{width:8px;height:8px;border-radius:50%;background:#3FB37F;flex:none;box-shadow:0 0 0 3px rgba(63,179,127,.18);}
.side-version{font-family:"Space Mono",monospace;font-size:9.5px;color:#4E5C68;margin-top:12px;padding:0 2px;letter-spacing:.04em;}

/* ---------- topbar ---------- */
.topbar{height:56px;flex:none;background:var(--card);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:18px;padding:0 22px;}
.cluster-btn{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--panel);
  border-radius:10px;padding:6px 10px;color:var(--ink);}
.cluster-btn:hover{border-color:#D8CFC0;}
.cluster-glyph{width:26px;height:26px;border-radius:7px;background:var(--slate);color:#F3EEE6;display:grid;place-items:center;font-weight:600;font-size:13px;flex:none;}
.cluster-glyph.sm{width:24px;height:24px;font-size:12px;}
.cluster-info{display:flex;flex-direction:column;line-height:1.15;text-align:left;}
.cluster-name{font-size:13px;font-weight:600;}
.cluster-id{font-size:9.5px;color:var(--muted);}
.cluster-dd{position:relative;}
.cluster-menu{min-width:248px;}
.dd-head{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px 6px;}
.topbar-mid{flex:1;display:flex;align-items:center;gap:12px;}
.time-range{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:7px 11px;color:var(--soft);font-size:12.5px;background:var(--panel);}
.time-range:hover{border-color:#D8CFC0;cursor:pointer;}
.global-search{flex:1;max-width:420px;display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:9px;padding:7px 12px;color:var(--muted);background:var(--panel);}
.global-search input{border:0;background:transparent;outline:none;flex:1;font-family:inherit;font-size:13px;color:var(--ink);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.icon-btn{position:relative;border:0;background:transparent;color:var(--soft);padding:6px;border-radius:8px;}
.icon-btn:hover{background:var(--line2);color:var(--ink);}
.badge-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--coral);border:1.5px solid var(--card);}
.badge-num{position:absolute;top:1px;right:0;min-width:15px;height:15px;border-radius:8px;background:var(--coral);color:#fff;font-size:9.5px;font-weight:700;font-family:"Space Mono",monospace;display:grid;place-items:center;padding:0 4px;border:1.5px solid var(--card);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--slate2);color:#F3EEE6;display:grid;place-items:center;font-size:12px;font-weight:600;letter-spacing:.02em;}

/* ---------- screen head ---------- */
.screen-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:18px;}
.screen-head h1{font-size:23px;}
.screen-sub{color:var(--soft);font-size:13px;margin:4px 0 0;}
.screen-sub b{color:var(--ink);font-weight:600;}
.screen-head-actions{display:flex;align-items:center;gap:10px;flex:none;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;font-size:12.5px;font-weight:500;padding:8px 13px;border:1px solid transparent;transition:.13s;}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 6px 16px -10px rgba(236,126,84,.8);}
.btn-primary:hover{background:var(--coral-d);}
.btn-ghost{background:var(--card);border-color:var(--line);color:var(--ink);}
.btn-ghost:hover{border-color:#D8CFC0;background:var(--panel);}
.btn-mini{font-size:11.5px;padding:5px 9px;background:var(--panel);border:1px solid var(--line);color:var(--soft);border-radius:7px;}
.btn-mini:hover{border-color:#D8CFC0;color:var(--ink);}
.btn-block{width:100%;justify-content:center;margin-top:8px;}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px 12px;border-bottom:1px solid var(--line2);}
.card-head h3{font-size:14px;}
.card-sub{font-size:11.5px;color:var(--muted);font-weight:400;margin-left:0;display:block;margin-top:2px;}
.card-body{padding:14px 16px;}
.card-tag{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.04em;color:var(--teal);background:rgba(31,142,132,.09);padding:4px 8px;border-radius:6px;text-transform:uppercase;}
.grid{display:grid;gap:16px;}
.grid-2-1{grid-template-columns:1.55fr 1fr;}
.grid-1-1{grid-template-columns:1fr 1fr;}
.stack{display:flex;flex-direction:column;gap:16px;}

/* ---------- KPI ---------- */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px 12px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.kpi-link{cursor:pointer;transition:border-color .12s, transform .12s;}
.kpi-link:hover{border-color:#D8CFC0;transform:translateY(-1px);}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;}
.kpi-label{display:flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.06em;color:var(--soft);font-weight:700;}
.kpi-dot{width:8px;height:8px;border-radius:2px;}
.kpi-new{font-size:11px;color:var(--soft);font-weight:600;}
.kpi-new em{font-style:normal;color:var(--muted);font-weight:400;font-size:10px;}
.kpi-num{font-size:34px;font-weight:600;letter-spacing:-.03em;line-height:1.05;margin:6px 0 4px;}
.spark{display:block;}

/* ---------- charts / legends ---------- */
.chart{width:100%;}
.legend-row{display:flex;flex-wrap:wrap;gap:16px;padding-top:8px;margin-top:4px;border-top:1px solid var(--line2);}
.lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--soft);font-family:"Space Mono",monospace;}
.lg i{width:9px;height:9px;border-radius:2px;}
.lg b{color:var(--ink);}
.donut-legend{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.donut-legend span{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--soft);}
.donut-legend i{width:9px;height:9px;border-radius:2px;flex:none;}
.donut-legend b{margin-left:auto;color:var(--ink);font-family:"Space Mono",monospace;font-size:11px;}

/* ---------- tables ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl thead th{text-align:left;font-weight:600;color:var(--soft);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  padding:10px 12px;border-bottom:1px solid var(--line);background:var(--panel);white-space:nowrap;font-family:"Space Mono",monospace;}
.tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--line2);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:0;}
.tbl-hover tbody tr{cursor:pointer;transition:background .1s;}
.tbl-hover tbody tr:hover{background:#FBF7F0;}
.tbl-dense tbody td{padding:7px 12px;}
.tbl-dense thead th{padding:8px 12px;}
.tbl-bordered td,.tbl-bordered th{border-right:1px solid var(--line2);}
.tbl-bordered td:last-child,.tbl-bordered th:last-child{border-right:0;}
.tbl th.r,.tbl td.r{text-align:right;} .tbl th.c,.tbl td.c{text-align:center;}
.mono-cell{font-family:"Space Mono",monospace;}
.tbl .sm{font-size:11px;}
.sortable{cursor:pointer;user-select:none;}
.sortable:hover{color:var(--ink);}
.sort-arrow{color:var(--coral);margin-left:3px;font-weight:700;}
.tbl-wrap{overflow-x:auto;}
.wrap-cell{white-space:normal;max-width:240px;line-height:1.4;font-size:12px;}

/* version cells */
.ver-cur{color:var(--soft);}
.ver-arr{color:var(--muted);margin:0 5px;}
.ver-fix{color:var(--teal);}
.ver-none{color:#C09A8E;font-style:italic;}
.pkg{display:inline-flex;align-items:center;gap:7px;}
.pkg-type{font-family:"Space Mono",monospace;font-size:9.5px;font-style:normal;color:var(--muted);background:var(--line2);padding:2px 5px;border-radius:4px;text-transform:lowercase;}

/* mini severity bar */
.mini-bar{display:flex;height:7px;width:100%;border-radius:4px;overflow:hidden;background:var(--line2);}
.mini-bar i{height:100%;display:block;}

/* ---------- severity chips ---------- */
.sev{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.04em;
  padding:3px 8px 3px 7px;border-radius:6px;border:1px solid transparent;font-family:"Space Mono",monospace;}
.sev-dot{width:7px;height:7px;border-radius:50%;}
.sev-solid{color:#fff;border:0;padding:3px 9px;}

/* KEV / EPSS / scanner / state / SLA */
.kev-tag{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;letter-spacing:.05em;color:#fff;background:#8B1E16;padding:2px 6px;border-radius:5px;}
.kev-lg{font-size:11px;padding:4px 9px;background:#A8261C;}
.epss{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end;}
.epss-bar{width:42px;height:5px;border-radius:3px;background:var(--line2);overflow:hidden;}
.epss-bar i{display:block;height:100%;}
.epss-num{font-family:"Space Mono",monospace;font-size:11px;color:var(--soft);min-width:30px;text-align:right;}
.scanner-tag{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;letter-spacing:.02em;}
.sc-trivy{background:#E7F0EF;color:#1C7A70;}
.sc-grype{background:#EAEAF3;color:#5A4F9E;}
.scanner-stack{display:inline-flex;gap:4px;}
.scanner-select{display:flex;flex-direction:column;gap:6px;}
.scanner-select label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.state-tag{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid transparent;}
.st-open{background:#FCEBDD;color:#C2540D;border-color:#EFD3B7;}
.st-stale{background:#EDEAE4;color:#7A7468;border-color:#DED9CF;}
.st-ack{background:#E4F0F6;color:#2F6E96;border-color:#C5DDE9;}
.st-res{background:#E3F1E7;color:#2E7D4F;border-color:#C3E2CC;}
.st-na{background:#E9EEF2;color:#46586A;border-color:#CBD6DF;}
.st-risk{background:#F3E9DC;color:#8A5A23;border-color:#E2CFB4;}
.sla{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--soft);}
.sla-tight{color:#C2540D;}
.sla-over{background:#C0271D;color:#fff;padding:3px 8px;border-radius:5px;font-size:10px;}

/* ---------- findings layout ---------- */
.findings-layout{display:grid;grid-template-columns:218px 1fr;gap:16px;align-items:start;}
.facets{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:6px;box-shadow:var(--shadow);position:sticky;top:0;}
.facet-search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;color:var(--muted);margin:6px 4px 10px;}
.facet-search.inline{margin:0;background:var(--panel);min-width:250px;}
.facet-search input{border:0;background:transparent;outline:none;flex:1;font-family:inherit;font-size:12.5px;color:var(--ink);}
.facet{padding:8px 4px;border-top:1px solid var(--line2);}
.facet:first-of-type{border-top:0;}
.facet-title{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:2px 8px 8px;font-weight:700;}
.facet-row{display:flex;align-items:center;gap:8px;width:100%;border:0;background:transparent;padding:5px 8px;border-radius:7px;text-align:left;color:var(--soft);font-size:12px;}
.facet-row:hover{background:var(--panel);}
.facet-check{width:14px;height:14px;border-radius:4px;border:1.5px solid #CFC8BA;flex:none;transition:.1s;}
.facet-on .facet-check{background:var(--coral);border-color:var(--coral);box-shadow:inset 0 0 0 2px #fff;}
.facet-on{color:var(--ink);font-weight:500;}
.facet-label{flex:1;display:flex;align-items:center;gap:6px;}
.facet-count{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted);}
.findings-main{min-width:0;}
.server-note{display:flex;align-items:center;gap:8px;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--teal);
  background:rgba(31,142,132,.06);border:1px solid rgba(31,142,132,.16);border-radius:8px;padding:7px 11px;margin-bottom:12px;}
.findings-main .tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);}

/* kibana-style filter bar */
.filter-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:12px;}
.fpill{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid #E0D2C5;border-radius:8px;padding:5px 6px 5px 10px;font-size:12px;color:var(--ink);box-shadow:var(--shadow);}
.fpill:hover{border-color:var(--coral);}
.fpill-field{font-weight:600;}
.fpill-op{color:var(--muted);font-style:italic;font-size:11px;}
.fpill-vals{font-family:"Space Mono",monospace;font-size:11px;color:var(--coral-d);max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fpill-x{display:grid;place-items:center;width:17px;height:17px;border-radius:5px;color:var(--muted);font-size:14px;line-height:1;}
.fpill-x:hover{background:#F3E2D9;color:var(--coral);}
.add-filter{display:inline-flex;align-items:center;gap:6px;border:1px dashed #CFC4B5;background:transparent;color:var(--soft);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:500;}
.add-filter:hover{border-color:var(--coral);color:var(--coral-d);background:#FDF4EF;}
.clear-all{border:0;background:transparent;color:var(--muted);font-size:11.5px;text-decoration:underline;text-underline-offset:2px;padding:4px;}
.clear-all:hover{color:var(--coral-d);}
.filter-menu{min-width:248px;max-width:280px;}
.filter-field{justify-content:space-between;}
.filter-field>span:first-child{flex:1;}
.field-badge{background:var(--coral);color:#fff;font-size:10px;font-weight:700;font-family:"Space Mono",monospace;min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center;padding:0 5px;}
.filter-back{display:flex;align-items:center;gap:7px;width:100%;border:0;background:transparent;color:var(--ink);font-weight:600;font-size:12.5px;padding:7px 9px;border-bottom:1px solid var(--line2);margin-bottom:4px;}
.filter-back:hover{color:var(--coral-d);}
.filter-back svg{color:var(--muted);}
.filter-vsearch{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:7px;padding:6px 9px;margin:0 4px 6px;color:var(--muted);}
.filter-vsearch input{border:0;background:transparent;outline:none;flex:1;font-size:12px;color:var(--ink);font-family:inherit;}
.filter-values{max-height:240px;overflow-y:auto;}
.filter-clear-field{width:100%;border:0;border-top:1px solid var(--line2);background:transparent;color:var(--muted);font-size:11.5px;padding:8px;margin-top:4px;}
.filter-clear-field:hover{color:var(--coral-d);}
.empty-row{text-align:center;color:var(--muted);padding:34px 12px;font-size:13px;}
.link-btn{border:0;background:transparent;color:var(--coral-d);text-decoration:underline;text-underline-offset:2px;font-size:13px;cursor:pointer;}

/* toolbar row (filter bar + columns) */
.toolbar-row{display:flex;align-items:flex-start;gap:10px;}
.toolbar-row .filter-bar{flex:1;}
.cols-dd{flex:none;}
.dd-menu.cols-menu{right:0;left:auto;}
.save-view{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--teal);font-size:11.5px;font-weight:600;padding:6px 8px;border-radius:7px;}
.save-view:hover{background:rgba(31,142,132,.08);}

/* bulk actions */
.bulk-bar{display:flex;align-items:center;gap:9px;background:var(--slate);color:#E4EAEF;border-radius:10px;padding:8px 12px;margin-bottom:12px;}
.bulk-count{font-family:"Space Mono",monospace;font-size:11.5px;font-weight:700;color:var(--amber);margin-right:4px;}
.bulk-bar .btn-mini{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#E4EAEF;}
.bulk-bar .btn-mini:hover{border-color:var(--amber);color:#FBE6D8;}
.bulk-clear{margin-left:auto;border:0;background:transparent;color:#8C9AA5;font-size:11.5px;text-decoration:underline;text-underline-offset:2px;}
.bulk-clear:hover{color:#E4EAEF;}

/* row checkboxes */
.chk-col{width:34px;text-align:center;}
.row-chk{width:15px;height:15px;border-radius:4px;border:1.5px solid #CFC8BA;background:var(--card);padding:0;display:inline-block;vertical-align:middle;cursor:pointer;}
.row-chk:hover{border-color:var(--coral);}
.row-chk-on{background:var(--coral);border-color:var(--coral);box-shadow:inset 0 0 0 2.5px #fff;}
.row-checked td{background:#FDF4EC;}

/* scanner disagreement */
.disagree-tag{display:inline-flex;align-items:center;gap:3px;font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;color:#9A6B05;background:#FBF1D6;border:1px solid #EBDDAE;padding:2.5px 6px;border-radius:5px;cursor:help;}

/* saved views */
.views-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.view-card{display:flex;flex-direction:column;gap:9px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;cursor:pointer;transition:border-color .12s, transform .12s;font-family:inherit;font-size:13px;color:var(--ink);}
.view-card:hover{border-color:var(--coral);transform:translateY(-1px);}
.view-card-top{display:flex;align-items:center;gap:9px;}
.view-card-top svg{color:var(--coral);}
.view-name{font-weight:600;font-size:14.5px;flex:1;letter-spacing:-.01em;}
.view-count{font-family:"Space Mono",monospace;font-size:11.5px;font-weight:700;color:var(--soft);background:var(--panel);border:1px solid var(--line2);padding:2px 8px;border-radius:10px;}
.view-desc{margin:0;color:var(--soft);font-size:12px;line-height:1.45;}
.view-pills{display:flex;flex-wrap:wrap;gap:6px;}
.view-pill{font-size:10.5px;font-family:"Space Mono",monospace;background:var(--panel);border:1px solid var(--line2);border-radius:6px;padding:3px 8px;color:var(--ink);}
.view-pill em{font-style:normal;color:var(--muted);margin-right:4px;}
.view-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px;border-top:1px solid var(--line2);padding-top:10px;}
.view-owner{font-size:11px;color:var(--muted);}
.view-open{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;color:var(--coral-d);}

/* topbar search results */
.global-search{position:relative;}
.search-menu{left:0;right:0;min-width:0;max-height:380px;overflow-y:auto;}
.search-item{gap:8px;}
.search-item .strong{flex:none;}
.search-sub{margin-left:auto;font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}
.search-none{padding:14px 12px;font-size:12px;color:var(--muted);text-align:center;}

/* notifications */
.dd-menu.notif-menu{right:0;left:auto;min-width:330px;}
.notif-item{align-items:flex-start;gap:10px;}
.notif-icon{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;margin-top:1px;}
.notif-sla{background:#FBE7E4;color:#B5231A;}
.notif-asgn{background:#E4F0F6;color:#2F6E96;}
.notif-body{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.notif-line{display:flex;align-items:center;gap:7px;}
.notif-line b{font-size:12px;}
.notif-msg{font-size:11.5px;color:var(--soft);line-height:1.4;}

/* pager extras */
.pager-right{display:flex;align-items:center;gap:16px;}
.pager-size{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);font-family:"Space Mono",monospace;}
.pager-size select{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:4px 6px;font-size:11.5px;color:var(--ink);font-family:inherit;outline:none;}
.pager-size select:focus{border-color:var(--coral);}
.select-input{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--ink);outline:none;min-width:170px;}
.select-input:focus{border-color:var(--coral);}
.th-note{display:block;font-size:8.5px;color:var(--muted);letter-spacing:.04em;font-weight:400;margin-top:1px;text-transform:none;}
.mix-cell{display:flex;flex-direction:column;gap:3px;min-width:130px;}
.mix-nums{display:flex;gap:10px;font-family:"Space Mono",monospace;font-size:9.5px;line-height:1;}
.mix-nums b{font-weight:700;}
.scanner-filter{background:var(--card);}

/* keyboard focus */
.facet-row:focus-visible,.dd-item:focus-visible,.filter-field:focus-visible,.add-filter:focus-visible,.fpill:focus-visible,.row-chk:focus-visible,.btn:focus-visible,.side-item:focus-visible,.icon-btn:focus-visible,.seg-opt:focus-visible{outline:2px solid var(--coral);outline-offset:1px;}

/* pager */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.pager-info{font-size:11.5px;color:var(--muted);font-family:"Space Mono",monospace;}
.pager-btns{display:flex;gap:5px;}
.pager-btns button{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--soft);min-width:32px;}
.pager-btns button:hover:not(:disabled){border-color:#D8CFC0;color:var(--ink);}
.pager-btns button:disabled{opacity:.4;cursor:default;}
.pg-on{background:var(--slate)!important;color:#F3EEE6!important;border-color:var(--slate)!important;}
.pg-ell{font-size:11px;color:var(--muted);align-self:center;padding:0 4px;}

/* ---------- dropdown ---------- */
.dropdown{position:relative;}
.dd-btn{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--card);border-radius:9px;padding:7px 11px;color:var(--ink);font-size:13px;}
.dd-btn:hover{border-color:#D8CFC0;}
.dd-img{color:var(--soft);font-size:12.5px;}
.dd-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:30;background:var(--card);border:1px solid var(--line);
  border-radius:10px;box-shadow:0 14px 40px -16px rgba(22,35,47,.4);padding:6px;min-width:230px;}
.dd-item{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;padding:8px 10px;border-radius:8px;text-align:left;color:var(--ink);font-size:12.5px;}
.dd-item:hover{background:var(--panel);}
.dd-item-on{background:rgba(236,126,84,.1);}

/* ---------- finding detail ---------- */
.back-link{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--soft);font-size:12.5px;padding:0 0 14px;}
.back-link:hover{color:var(--coral);}
.detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;background:var(--card);border:1px solid var(--line);
  border-left:4px solid var(--accent);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);}
.detail-cve{display:flex;align-items:center;gap:12px;}
.detail-cve h1{font-size:26px;font-family:"Space Mono",monospace;letter-spacing:-.01em;}
.detail-title{margin:8px 0 14px;font-size:15px;color:var(--ink);max-width:760px;line-height:1.45;}
.detail-meta{display:flex;flex-wrap:wrap;gap:22px;}
.detail-meta span{font-size:12.5px;color:var(--ink);}
.detail-meta em{font-style:normal;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:6px;}
.sla-box{flex:none;width:128px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:1px;background:var(--panel);}
.sla-box-over{background:#FBEAE7;border-color:#EBC3bd;}
.sla-box-label{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.sla-box-days{font-size:30px;font-weight:600;letter-spacing:-.03em;}
.sla-box-days em{font-style:normal;font-size:16px;color:var(--soft);}
.sla-box-deadline{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--soft);margin-top:3px;}
.sla-box-over .sla-box-deadline,.sla-box-over .sla-box-days{color:#B5231A;}
.prose{margin:0 0 14px;color:#3A4651;line-height:1.6;font-size:13px;}
.cvss-vector{background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:9px 12px;margin-bottom:14px;}
.cvss-vector .mono-cell{color:var(--soft);font-size:11px;}
.ref-list{display:flex;flex-direction:column;gap:6px;}
.ref{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--teal);text-decoration:none;font-family:"Space Mono",monospace;}
.ref:hover{text-decoration:underline;}
.match-fixed{display:inline-flex;align-items:center;gap:4px;color:#2E7D4F;font-size:11.5px;font-weight:600;}
.evidence-note{margin:12px 0 0;font-size:11.5px;color:var(--soft);line-height:1.5;}

/* triage panel */
.triage{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);position:sticky;top:0;overflow:hidden;}
.triage-head{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid var(--line2);font-weight:600;font-size:14px;background:var(--panel);}
.triage-head svg{color:var(--coral);}
.triage-head .state-tag{margin-left:auto;}
.triage-body{padding:16px;}
.fld-label{display:block;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px;}
.fld-label:first-child{margin-top:0;}
.state-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.state-opt{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:8px 4px;font-size:12px;color:var(--soft);font-weight:500;}
.state-opt:hover{border-color:#D8CFC0;}
.state-opt-on{font-weight:600;}
.state-opt-on.st-open{background:#FCEBDD;color:#C2540D;border-color:#E2640F;}
.state-opt-on.st-ack{background:#E4F0F6;color:#2F6E96;border-color:#3D7DA6;}
.state-opt-on.st-res{background:#E3F1E7;color:#2E7D4F;border-color:#2E7D4F;}
.state-opt-on.st-na{background:#E9EEF2;color:#46586A;border-color:#46586A;}
.triage-hint{display:flex;gap:7px;font-size:10.5px;color:var(--soft);line-height:1.5;margin:10px 0 4px;background:var(--panel);padding:8px 10px;border-radius:8px;}
.triage-hint svg{flex:none;margin-top:1px;color:var(--muted);}
.fld{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--card);outline:none;resize:vertical;}
.fld:focus{border-color:var(--coral);}
.fld-static{background:var(--panel);color:var(--soft);}
.fld-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ---------- image detail ---------- */
.img-cell{display:flex;flex-direction:column;line-height:1.25;}
.img-name{font-weight:600;font-size:13px;}
.img-reg{color:var(--muted);}
.run-on{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#2E7D4F;}
.run-dot{width:7px;height:7px;border-radius:50%;background:#3FB37F;box-shadow:0 0 0 3px rgba(63,179,127,.18);}
.run-off{font-size:11.5px;color:var(--muted);font-style:italic;}
.img-detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);}
.img-detail-id{display:flex;gap:16px;}
.img-cube{width:48px;height:48px;border-radius:12px;background:var(--slate);color:var(--amber);display:grid;place-items:center;flex:none;}
.img-detail-id h1{font-size:22px;display:flex;align-items:center;gap:12px;}
.img-tag-badge{font-family:"Space Mono",monospace;font-size:12px;font-weight:400;color:var(--soft);background:var(--line2);padding:3px 9px;border-radius:6px;}
.img-detail-meta{display:flex;align-items:center;gap:16px;margin-top:10px;}
.sev-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:16px 0;}
.sev-sum{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow);border-left:3px solid var(--accent);}
.sev-sum-num{display:block;font-size:25px;font-weight:600;letter-spacing:-.02em;}
.sev-sum-label{display:flex;align-items:center;gap:6px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.04em;color:var(--soft);margin-top:3px;font-weight:700;}
.sev-sum-label i{width:7px;height:7px;border-radius:2px;}
.sev-sum-total{border-left-color:var(--slate);}
.task-link{color:var(--teal);}

/* ---------- heroes ---------- */
.hero-note{display:flex;align-items:center;gap:8px;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--soft);
  background:var(--panel);border:1px solid var(--line2);border-radius:8px;padding:8px 11px;margin-bottom:14px;line-height:1.4;}
.hero-note svg{flex:none;color:var(--muted);}
.hero-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.hero-kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;box-shadow:var(--shadow);border-top:3px solid var(--accent);}
.hero-kpi-num{display:block;font-size:27px;font-weight:600;letter-spacing:-.03em;line-height:1;}
.hero-kpi-label{display:block;font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.06em;color:var(--soft);font-weight:700;margin-top:8px;}
.hero-kpi-sub{display:block;font-size:10.5px;color:var(--muted);margin-top:2px;}

.hero-av{border-radius:50%;color:#fff;display:inline-grid;place-items:center;font-weight:600;letter-spacing:.02em;flex:none;}
.av{border-radius:50%;color:#fff;display:inline-grid;place-items:center;font-weight:600;letter-spacing:.01em;flex:none;}
.assignee-cell{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);}
.assignee-mini{display:inline-flex;align-items:center;gap:6px;}
.assignee-none{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;}
.assignee-none .av-empty{width:22px;height:22px;border-radius:50%;border:1.5px dashed #CFC8BA;flex:none;}
.assignee-field{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;background:var(--panel);border:1px solid var(--line2);border-radius:9px;}

.podiums{display:grid;grid-template-columns:1fr 1.12fr 1fr;gap:12px;align-items:end;}
.podium{display:flex;flex-direction:column;align-items:center;text-align:center;border:1px solid var(--line);border-radius:12px;padding:18px 14px 16px;background:var(--panel);position:relative;}
.podium-1{background:linear-gradient(180deg,#FDF4E9,#FBFAF6);border-color:#EAD6BC;padding-top:24px;box-shadow:0 14px 30px -22px rgba(236,126,84,.6);}
.podium-rank{position:absolute;top:-11px;width:24px;height:24px;border-radius:50%;background:var(--slate);color:#F3EEE6;display:grid;place-items:center;font-size:12px;font-weight:700;font-family:"Space Mono",monospace;}
.podium-1 .podium-rank{background:var(--coral);width:28px;height:28px;top:-13px;font-size:13px;}
.podium-name{font-weight:600;font-size:14px;margin-top:9px;letter-spacing:-.01em;}
.podium-role{font-size:11px;color:var(--muted);margin-top:1px;}
.podium-num{font-size:24px;font-weight:600;letter-spacing:-.02em;margin-top:10px;}
.podium-num em{font-style:normal;font-size:10.5px;color:var(--soft);font-family:"Space Mono",monospace;display:block;font-weight:400;letter-spacing:.04em;}
.podium-bar{margin:11px 0 9px;max-width:130px;}
.podium-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:5px 12px;font-size:11px;color:var(--soft);}
.podium-meta span{white-space:nowrap;}
.podium-meta b{color:var(--ink);}
.podium-streak{width:100%;color:var(--coral-d);font-weight:600;font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.streak-dot{width:6px;height:6px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 3px rgba(236,126,84,.18);}

.rank-cell{font-family:"Space Mono",monospace;color:var(--muted);font-weight:700;width:28px;}
.lb-person{display:flex;align-items:center;gap:10px;}
.lb-id{display:flex;flex-direction:column;line-height:1.2;}
.lb-name{font-weight:600;font-size:12.5px;}
.lb-role{font-size:10.5px;color:var(--muted);}
.sla-pct{font-family:"Space Mono",monospace;font-size:11.5px;font-weight:700;padding:2px 7px;border-radius:5px;}
.sla-pct.good{color:#2E7D4F;background:#E3F1E7;}
.sla-pct.ok{color:#9A6B05;background:#FBF1D6;}
.sla-pct.low{color:#C2540D;background:#FCEBDD;}

.feed{display:flex;flex-direction:column;}
.feed-item{display:flex;gap:11px;align-items:flex-start;padding:11px 2px;border-bottom:1px solid var(--line2);cursor:pointer;}
.feed-item:last-child{border-bottom:0;}
.feed-item:hover{background:#FBF7F0;border-radius:8px;}
.feed-body{flex:1;min-width:0;}
.feed-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.feed-line b{font-size:12.5px;font-weight:600;}
.feed-act{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:.02em;}
.act-resolved{background:#E3F1E7;color:#2E7D4F;}
.act-acknowledged{background:#E4F0F6;color:#2F6E96;}
.act-opened{background:#FCEBDD;color:#C2540D;}
.act-assigned{background:#EAEAF3;color:#5A4F9E;}
.act-ignore{background:#FBF1D6;color:#9A6B05;}
.act-config{background:#ECEDEE;color:#5B6770;}
.audit-target{display:inline-flex;align-items:center;gap:8px;}
.token-actions{display:inline-flex;gap:6px;}

/* ---------- health & fleet ---------- */
.health-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid transparent;}
.health-tag i{width:7px;height:7px;border-radius:50%;background:currentColor;}
.health-ok{background:#E3F1E7;color:#2E7D4F;border-color:#C3E2CC;}
.health-deg{background:#FBE7E4;color:#B5231A;border-color:#E7C0BB;}
.health-stale{background:#FBF1D6;color:#9A6B05;border-color:#EBDDAE;}
.health-pending{background:#E4F0F6;color:#2F6E96;border-color:#C5DDE9;}
.deg-note{color:#B5231A;font-weight:600;}
.fleet-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.fleet-card{margin-top:0;}
.cluster-cell{display:flex;align-items:center;gap:10px;}
.scanner-health{display:inline-flex;align-items:center;gap:4px;}
.sc-dot{width:7px;height:7px;border-radius:50%;}
.sc-ok{background:#3FB37F;}
.sc-bad{background:#C0271D;box-shadow:0 0 0 3px rgba(192,39,29,.15);}
.sweep-stale{color:#9A6B05!important;font-weight:700;}
.fleet-note{display:flex;align-items:center;gap:8px;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--soft);margin:12px 0 0;line-height:1.5;}
.fleet-note svg{color:var(--teal);flex:none;}

/* ---------- scanner status ---------- */
.scan-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.scan-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;}
.scan-card-deg{border-color:#E7C0BB;}
.scan-card-head{display:flex;align-items:center;gap:10px;}
.scan-card-head .health-tag{margin-left:auto;}
.scan-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0 14px;}
.scan-stat{display:flex;flex-direction:column;gap:2px;}
.scan-num{font-size:23px;font-weight:600;letter-spacing:-.02em;}
.scan-bad{color:#B5231A;}
.scan-lbl{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;}
.scan-meta{display:flex;gap:22px;border-top:1px solid var(--line2);padding-top:12px;}
.scan-meta em{font-style:normal;font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:6px;}
.scan-chart-card .card-body{padding-top:10px;}
.ingest-status{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;}
.ing-retrying{background:#FCEBDD;color:#C2540D;}
.ing-dead-letter{background:#FBE7E4;color:#B5231A;}
.ing-resolved{background:#E3F1E7;color:#2E7D4F;}

/* ---------- SLA editor / role matrix ---------- */
.sla-input{display:flex;align-items:center;gap:9px;}
.sla-unit{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted);}
.role-matrix thead th{font-size:9.5px;}
.perm-yes{color:#2E7D4F;display:inline-flex;}
.perm-no{color:#C9CFD4;}

/* ---------- user menu & login ---------- */
.dd-menu.user-menu{right:0;left:auto;min-width:230px;}
.avatar{border:0;cursor:pointer;}
.user-menu-head{display:flex;align-items:center;gap:11px;padding:10px 12px;border-bottom:1px solid var(--line2);margin-bottom:5px;}
.user-menu-head b{display:block;font-size:13.5px;}
.user-role{font-family:"Space Mono",monospace;font-size:10px;color:var(--teal);background:rgba(31,142,132,.09);padding:2px 7px;border-radius:5px;display:inline-block;margin-top:3px;}
.login-stage{height:100%;display:grid;place-items:center;background:var(--slate);}
.login-card{width:360px;background:var(--card);border-radius:16px;padding:30px 28px 24px;box-shadow:0 30px 80px -30px rgba(0,0,0,.6);}
.login-brand{display:flex;align-items:center;gap:13px;}
.login-sub{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted);margin:10px 0 22px;letter-spacing:.03em;}
.login-card .fld{margin-bottom:4px;}
.login-card .btn-block{margin-top:14px;}
.login-divider{display:flex;align-items:center;gap:12px;margin:16px 0 2px;color:var(--muted);font-size:11px;}
.login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:var(--line2);}
.login-note{font-size:11px;color:var(--muted);line-height:1.5;margin:18px 0 0;text-align:center;}

/* ---------- time picker ---------- */
.dd-menu.time-menu{min-width:340px;}
.time-rel{display:flex;align-items:center;gap:8px;padding:4px 10px 10px;}
.time-rel-label{font-size:12px;color:var(--soft);}
.time-apply{margin-left:auto;}
.time-presets{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:2px 8px 10px;}
.time-preset{border:0;background:transparent;text-align:left;padding:6px 9px;border-radius:7px;font-size:12px;color:var(--ink);}
.time-preset:hover{background:var(--panel);}
.time-preset-on{background:rgba(236,126,84,.1);color:var(--coral-d);font-weight:600;}
.time-abs{display:flex;align-items:center;gap:7px;padding:4px 10px 8px;}
.time-abs .text-input{padding:6px 8px;font-size:11px;}
.time-arrow{color:var(--muted);flex:none;}
.time-note{font-family:"Space Mono",monospace;font-size:9.5px;color:var(--muted);padding:8px 10px 6px;border-top:1px solid var(--line2);line-height:1.5;}

/* ---------- first-run empty state ---------- */
.firstrun{max-width:460px;margin:80px auto 0;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:42px 38px 34px;box-shadow:var(--shadow);}
.firstrun-icon{width:54px;height:54px;border-radius:16px;background:var(--slate);color:var(--amber);display:grid;place-items:center;margin:0 auto 18px;}
.firstrun h2{font-size:19px;letter-spacing:-.01em;}
.firstrun p{color:var(--soft);font-size:13px;line-height:1.6;margin:10px 0 0;}
.firstrun-meta{display:flex;align-items:center;justify-content:center;gap:9px;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--soft);margin:18px 0 22px;}
.firstrun-actions{display:flex;justify-content:center;gap:10px;}
.kpi-fix-sub{font-size:10.5px;color:var(--soft);font-family:"Space Mono",monospace;display:block;margin-top:9px;}
.feed-cve{font-size:11.5px;color:var(--ink);}
.feed-note{font-size:11.5px;color:var(--soft);margin-top:3px;line-height:1.4;}
.feed-when{font-family:"Space Mono",monospace;font-size:10px;color:var(--muted);flex:none;white-space:nowrap;}

/* ---------- settings ---------- */
.set-layout{display:grid;grid-template-columns:198px 1fr;gap:18px;align-items:stretch;min-height:calc(100vh - 196px);}
.set-nav{position:sticky;top:0;display:flex;flex-direction:column;gap:2px;align-self:start;}
.set-nav-item{display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--soft);padding:9px 11px;border-radius:9px;font-size:13px;text-align:left;}
.set-nav-item:hover{background:var(--card);color:var(--ink);}
.set-nav-on{background:var(--card);color:var(--ink);font-weight:600;box-shadow:var(--shadow);}
.set-nav-on svg{color:var(--coral);}
.set-nav-item{position:relative;}
.scope-dot{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;}
.scope-cluster{--sc:#3D7DA6;}
.scope-scanner{--sc:#1F8E84;}
.scope-org{--sc:#9A6B05;}
.scope-dot.scope-cluster{background:#3D7DA6;}
.scope-dot.scope-scanner{background:#1F8E84;}
.scope-dot.scope-org{background:#9A6B05;}
.scope-strip{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:10px;margin-bottom:14px;border:1px solid var(--line2);background:var(--panel);border-left:3px solid var(--sc);}
.scope-badge{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--sc);padding:3px 9px;border-radius:6px;flex:none;}
.scope-note{font-size:11.5px;color:var(--soft);}
.db-tabs{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.db-cache{color:var(--muted);}
.set-panel{min-width:0;display:flex;flex-direction:column;}
.set-panel-body{flex:1 1 auto;}
.set-card-title{display:inline-flex;align-items:center;gap:9px;}

.set-row{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 0;border-bottom:1px solid var(--line2);}
.set-row:last-child{border-bottom:0;padding-bottom:2px;}
.set-row-stack{flex-direction:column;align-items:stretch;gap:10px;}
.set-row-label{display:flex;flex-direction:column;gap:3px;max-width:340px;}
.set-row-label span:first-child{font-size:13px;font-weight:500;color:var(--ink);}
.set-hint{font-size:11.5px;color:var(--muted);line-height:1.45;}
.set-row-ctrl{flex:none;}
.set-row-stack .set-row-ctrl{flex:1;}
.set-row-2col{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
.set-row-2col .set-row{border-bottom:1px solid var(--line2);}

/* switch */
.switch{width:40px;height:23px;border-radius:20px;border:0;background:#D8D1C4;padding:0;position:relative;transition:background .15s;cursor:pointer;}
.switch i{position:absolute;top:2.5px;left:2.5px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch-on{background:var(--coral);}
.switch-on i{left:19px;}

/* segmented */
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.seg-opt{border:0;background:transparent;color:var(--soft);font-size:12px;padding:5px 12px;border-radius:6px;font-weight:500;white-space:nowrap;}
.seg-opt:hover{color:var(--ink);}
.seg-on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(22,35,47,.12);}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:7px;align-items:center;width:100%;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 6px 4px 10px;font-size:11.5px;font-family:"Space Mono",monospace;color:var(--ink);}
.chip button{border:0;background:transparent;color:var(--muted);font-size:15px;line-height:1;padding:0 2px;cursor:pointer;border-radius:4px;}
.chip button:hover{color:var(--coral);background:#F3E2D9;}
.chip-input{border:1px dashed var(--line);background:transparent;border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--ink);outline:none;min-width:150px;flex:1;}
.chip-input:focus{border-color:var(--coral);border-style:solid;}

/* checkbox row */
.check-grid{display:flex;flex-wrap:wrap;gap:8px;}
.checkbox-row{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:6px 11px 6px 9px;font-size:12px;color:var(--soft);}
.checkbox-row:hover{border-color:#D8CFC0;}
.cb-box{width:14px;height:14px;border-radius:4px;border:1.5px solid #CFC8BA;flex:none;}
.checkbox-on{border-color:var(--coral);background:#FDF2EC;color:var(--ink);}
.checkbox-on .cb-box{background:var(--coral);border-color:var(--coral);box-shadow:inset 0 0 0 2px #fff;}

/* inputs */
.text-input,.num-input{border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-size:12.5px;color:var(--ink);background:var(--card);outline:none;width:100%;font-family:inherit;}
.num-input{width:88px;}
.text-input:focus,.num-input:focus{border-color:var(--coral);}
.token-row{display:flex;gap:8px;align-items:center;}
.lock-tag{font-family:"Space Mono",monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--panel);border:1px solid var(--line);padding:5px 9px;border-radius:6px;flex:none;}
.icon-del{border:0;background:transparent;color:var(--muted);padding:4px;border-radius:6px;cursor:pointer;}
.icon-del:hover{color:var(--coral);background:#F3E2D9;}

.scanner-banner,.ignore-best{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--teal);background:rgba(31,142,132,.06);border:1px solid rgba(31,142,132,.16);border-radius:9px;padding:9px 12px;line-height:1.45;}
.scanner-banner svg,.ignore-best svg{flex:none;}
.ignore-best{margin-bottom:14px;color:var(--soft);background:var(--panel);border-color:var(--line2);}
.ignore-best svg{color:var(--teal);}

/* save bar - module appended to the end of every settings category */
.save-bar{margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:13px 18px;background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);}
.save-msg{font-size:12.5px;color:var(--muted);font-weight:500;}
.save-bar-on{border-color:#EAD3C4;background:#FFFCFA;}
.save-bar-on .save-msg{color:var(--coral-d);}
.save-actions{display:flex;gap:10px;}
.save-bar .btn-primary:disabled,.save-bar .btn-ghost:disabled{opacity:.45;pointer-events:none;}

@media(max-width:1120px){
  .grid-2-1,.grid-1-1{grid-template-columns:1fr;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .hero-kpis{grid-template-columns:repeat(3,1fr);}
  .podiums{grid-template-columns:1fr;}
  .set-layout{grid-template-columns:1fr;}
  .set-nav{flex-direction:row;flex-wrap:wrap;position:static;}
  .findings-layout{grid-template-columns:1fr;}
  .sev-summary{grid-template-columns:repeat(3,1fr);}
  .fleet-kpis{grid-template-columns:repeat(3,1fr);}
  .scan-cards{grid-template-columns:1fr;}
}

/* ===== v4 additions ===== */
/* history / time-travel */
.history-banner{display:flex;align-items:center;gap:10px;background:#FBF0D9;border-bottom:1px solid #EAD6A8;color:#7A5A12;padding:9px 26px;font-size:12.5px;}
.history-banner svg{flex:none;color:#B07D17;}
.hb-text{flex:1;}
.hb-back{display:inline-flex;align-items:center;gap:6px;border:1px solid #D9B96A;background:#fff;color:#7A5A12;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;flex:none;}
.hb-back:hover{border-color:#B07D17;background:#FFFBF2;}
.time-range-hist{background:#FBF0D9 !important;border-color:#EAD6A8 !important;color:#7A5A12 !important;}
.time-travel{display:flex;flex-wrap:wrap;gap:6px;padding:2px 8px 8px;}
.tt-opt{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--soft);}
.tt-opt:hover{border-color:#D8CFC0;color:var(--ink);}
.tt-on{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600;}
.tt-note{font-size:10.5px;color:var(--muted);padding:6px 8px 10px;line-height:1.5;border-bottom:1px solid var(--line2);margin-bottom:4px;}

/* capability gating */
.gate-disabled{opacity:.95;}
.gate-disabled button,.gate-disabled .btn{opacity:.45;cursor:not-allowed;pointer-events:none;}
.triage-locked{display:flex;align-items:center;gap:8px;font-size:11px;color:#8A5A23;background:#F6EEDF;border:1px solid #E4D3B5;border-radius:8px;padding:8px 10px;margin-bottom:12px;line-height:1.45;}
.triage-locked svg{flex:none;}

/* modal */
.modal-scrim{position:fixed;inset:0;background:rgba(22,35,47,.46);backdrop-filter:blur(2px);display:grid;place-items:center;z-index:80;padding:24px;}
.modal{background:var(--card);border-radius:14px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);max-width:94vw;max-height:90vh;overflow:auto;}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--line2);}
.modal-head h3{font-size:16px;}
.modal-sub{display:block;font-size:12px;color:var(--muted);margin-top:3px;font-family:"Space Mono",monospace;}
.modal-x{border:0;background:transparent;font-size:22px;line-height:1;color:var(--muted);cursor:pointer;padding:0 4px;}
.modal-x:hover{color:var(--coral);}
.modal-body{padding:16px 18px 18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}

/* export dialog */
.exp-rows{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--soft);background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;margin-bottom:14px;}
.exp-modes{display:grid;gap:10px;}
.exp-mode{text-align:left;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:3px;}
.exp-mode:hover{border-color:#D8CFC0;}
.exp-mode-on{border-color:var(--coral);background:#FDF4EF;box-shadow:inset 0 0 0 1px var(--coral);}
.exp-mode b{font-size:13px;}
.exp-mode span{font-size:11.5px;color:var(--soft);line-height:1.45;}
.exp-warn{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#C2540D;background:#FCEBDD;border-radius:8px;padding:8px 10px;margin-top:12px;}
.exp-warn svg{flex:none;}
.exp-done{text-align:center;padding:8px 4px;}
.exp-done-icon{display:inline-grid;place-items:center;width:48px;height:48px;border-radius:50%;background:#E3F1E7;color:#2E7D4F;margin-bottom:10px;}
.exp-done p{font-size:13px;color:var(--ink);line-height:1.5;margin:0 0 16px;}

/* count disagreement */
.cd-agree{font-family:"Space Mono",monospace;font-weight:600;}
.cd-split{display:inline-flex;align-items:center;gap:5px;font-family:"Space Mono",monospace;font-size:11px;}
.cd-split .cd-t,.cd-split .cd-g{display:inline-flex;align-items:center;gap:3px;}
.cd-split i{font-style:normal;font-size:8.5px;font-weight:700;width:13px;height:13px;border-radius:3px;display:inline-grid;place-items:center;}
.cd-t i{background:#E7F0EF;color:#1C7A70;}
.cd-g i{background:#EAEAF3;color:#5A4F9E;}
.cd-delta{font-size:9.5px;font-weight:700;color:#9A6B05;background:#FBF1D6;padding:1px 5px;border-radius:4px;}

/* not-live inventory banner */
.notlive-banner{display:flex;align-items:center;gap:9px;border-radius:9px;padding:9px 13px;font-size:12px;margin-bottom:14px;line-height:1.45;}
.notlive-banner svg{flex:none;}
.nlb-warn{background:#FBF1D6;border:1px solid #EBDDAE;color:#7A5A12;}
.nlb-hist{background:#FBF0D9;border:1px solid #EAD6A8;color:#7A5A12;}

/* VEX justification chips */
.vex-block{margin-top:4px;}
.vex-chips{display:flex;flex-direction:column;gap:6px;}
.vex-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:7px 10px;text-align:left;}
.vex-chip:hover{border-color:#D8CFC0;}
.vex-chip-on{border-color:var(--coral);background:#FDF4EF;box-shadow:inset 0 0 0 1px var(--coral);}
.vex-chip-label{font-size:12px;color:var(--ink);}
.vex-maps{font-size:9.5px;font-weight:700;font-family:"Space Mono",monospace;padding:2px 6px;border-radius:5px;flex:none;}
.vm-fp{background:#FBE7E4;color:#B5231A;}
.vm-ne{background:#E9EEF2;color:#46586A;}

/* read-only state blocks */
.ro-state{display:flex;gap:9px;align-items:flex-start;border-radius:9px;padding:10px 12px;margin-top:8px;font-size:11.5px;line-height:1.45;}
.ro-state svg{flex:none;margin-top:2px;}
.ro-state b{display:block;font-size:12px;margin-bottom:2px;}
.ro-state span{color:var(--soft);}
.ro-risk{background:#F3E9DC;border:1px solid #E2CFB4;color:#8A5A23;}
.ro-stale{background:#EDEAE4;border:1px solid #DED9CF;color:#5F5A50;}
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.presence-note{display:flex;flex-direction:column;gap:5px;margin:12px 0 4px;font-size:10.5px;color:var(--soft);background:var(--panel);border-radius:8px;padding:9px 11px;line-height:1.4;}
.pn-row{display:flex;align-items:center;gap:7px;}
.pn-dot{width:8px;height:8px;border-radius:50%;flex:none;}
.pn-fixed{background:#2E7D4F;}
.pn-stale{background:#9A8A6A;}
.fld-opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);font-family:"Space Mono",monospace;font-size:9px;}
.triage-foot{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);margin:10px 0 0;line-height:1.4;}
.triage-foot svg{flex:none;}

/* risk-accept dialog */
.ra-anchor{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:9px 12px;margin-bottom:14px;}
.ra-anchor-note{font-size:11px;color:var(--soft);}
.ra-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.ra-chip{border:1px solid var(--line);background:var(--card);border-radius:7px;padding:5px 9px;font-size:11.5px;color:var(--soft);}
.ra-chip:hover{border-color:#D8CFC0;}
.ra-chip-on{border-color:var(--coral);background:#FDF4EF;color:var(--coral-d);font-weight:600;}
.ra-blast{display:flex;align-items:flex-start;gap:9px;background:#FEF6EE;border:1px solid #F0DCC9;border-radius:9px;padding:10px 12px;margin:12px 0;font-size:12px;color:var(--ink);line-height:1.5;}
.ra-blast svg{flex:none;margin-top:2px;color:var(--coral-d);}
.ra-blast em{font-style:normal;color:var(--soft);font-size:11px;}
.ra-note{display:flex;align-items:flex-start;gap:7px;font-size:10.5px;color:var(--soft);line-height:1.5;margin:10px 0 0;}
.ra-note svg{flex:none;margin-top:2px;}

/* decisions table chips */
.dec-inactive{opacity:.6;}
.dec-inactive .mono-cell.strong{text-decoration:line-through;}
.dec-active{font-size:10.5px;font-weight:700;color:#2E7D4F;background:#E3F1E7;padding:2px 8px;border-radius:10px;}
.dec-chip{font-size:10px;font-weight:700;font-family:"Space Mono",monospace;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;}
.dec-revoked{background:#FBE7E4;color:#B5231A;}
.dec-expired{background:#EDEAE4;color:#7A7468;}
.both-tag{font-size:10px;font-weight:700;font-family:"Space Mono",monospace;color:#46586A;background:#E9EEF2;padding:2px 7px;border-radius:5px;}
.casc-tag{display:inline-block;font-style:normal;font-size:9px;font-weight:700;color:#2F6E96;background:#E4F0F6;padding:1px 5px;border-radius:4px;margin-left:6px;}
.mt16{margin-top:16px;}
.mt0{margin-top:0;}

/* two-question image cards + digest timeline */
.two-q{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;}
.tq-card{background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);padding:13px 15px;display:flex;flex-direction:column;gap:5px;}
.tq-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--soft);font-family:"Space Mono",monospace;}
.tq-label svg{color:var(--coral-d);}
.tq-ans{font-size:17px;font-weight:600;letter-spacing:-.01em;}
.tq-src{font-size:10px;color:var(--muted);font-family:"Space Mono",monospace;text-transform:uppercase;letter-spacing:.04em;}
.digest-line{display:flex;align-items:center;gap:6px;margin:6px 0 0;color:var(--soft);}
.digest-line svg{color:var(--muted);}
.digest-note{font-style:normal;color:var(--muted);margin-left:8px;font-family:"Space Grotesk",sans-serif;font-size:10.5px;}
.digest-tl{display:flex;flex-direction:column;gap:2px;}
.digest-row{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid var(--line2);position:relative;}
.digest-row:last-child{border-bottom:0;}
.digest-dot{width:9px;height:9px;border-radius:50%;background:#CFC8BA;flex:none;}
.digest-running .digest-dot{background:#3FB37F;box-shadow:0 0 0 3px rgba(63,179,127,.18);}
.digest-range{color:var(--soft);}
.digest-counts{margin-left:auto;}
.digest-counts i{font-style:normal;font-weight:700;margin-left:6px;}
.digest-badge{font-size:9.5px;font-weight:700;font-family:"Space Mono",monospace;padding:2px 7px;border-radius:5px;}
.digest-now{background:#E3F1E7;color:#2E7D4F;}
.digest-marker{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#9A6B05;font-style:italic;}
.digest-marker svg{color:#C68A12;}
.empty-scan{text-align:center;padding:32px 16px;}
.empty-scan svg{color:var(--muted);}
.empty-scan h3{font-size:15px;margin:10px 0 6px;}
.empty-scan p{font-size:12.5px;color:var(--soft);max-width:440px;margin:0 auto;line-height:1.5;}

/* data & opensearch settings */
.ret-input{display:inline-flex;align-items:center;gap:7px;}
.ret-unit{font-size:11px;color:var(--muted);font-family:"Space Mono",monospace;}
.snap-actions{display:inline-flex;gap:8px;}
.btn-danger{border-color:#E7C0BB !important;color:#B5231A !important;}
.btn-danger:hover{background:#FBE7E4 !important;}
.health-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:"Space Mono",monospace;color:var(--soft);}
.health-chip i{width:8px;height:8px;border-radius:50%;background:#3FB37F;}
.h-ok i{background:#3FB37F;}

/* boot banner (login) */
.boot-banner{display:flex;align-items:center;gap:8px;background:#FBF1D6;border:1px solid #EBDDAE;color:#7A5A12;border-radius:9px;padding:9px 11px;font-size:12px;margin:8px 0 14px;line-height:1.4;}
.boot-banner svg{flex:none;}

@media(max-width:1120px){
  .two-q{grid-template-columns:1fr;}
  .state-grid{grid-template-columns:1fr 1fr;}
}
