# gitleaks config — full-history scan is part of the public-flip pre-flight (#236)
# and a sensible periodic check afterwards: gitleaks git --no-banner .

[extend]
useDefault = true

[allowlist]
description = "Known false positives"
paths = [
  # Recorded scanner outputs of the official python:3.9.16-slim image; its ENV carries the
  # CPython release manager's PUBLIC GPG key fingerprint (GPG_KEY=E3FF2839…), which the
  # generic-api-key rule flags. A public-key fingerprint is not a secret.
  '''scanner/tests/fixtures/.*\.json''',
]
