name: Versions drift

# D42: versions.yaml is the single source of truth for externally-owned tool/service versions.
# Consumers (scanner Dockerfiles, dev OpenSearch compose) keep a literal pin so they work
# standalone; this gate fails if any consumer drifts from versions.yaml. Fix: check-versions.sh --fix.

on:
  pull_request:
    paths:
      - 'versions.yaml'
      - 'scanner/Dockerfile.*'
      - 'development/setup/opensearch-dev.yml'
      - 'development/scripts/check-versions.sh'
      - 'development/scripts/check-scanner-db-policy.sh'
      - '.github/workflows/versions.yml'
  push:
    branches: [main]
    paths:
      - 'versions.yaml'
      - 'scanner/Dockerfile.*'
      - 'development/setup/opensearch-dev.yml'

permissions:
  contents: read

jobs:
  drift:
    name: Pins match versions.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Consumer pins match versions.yaml
        run: development/scripts/check-versions.sh
      - name: No supported scanner runs a frozen/incompatible vuln DB (M0b)
        run: development/scripts/check-scanner-db-policy.sh
