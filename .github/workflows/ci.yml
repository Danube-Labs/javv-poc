name: CI

# Quality gate for every PR + push to main: backend (ruff + pyright + pytest) and
# frontend (eslint + vitest), as required by development/standards/definition-of-done.md
# and git-workflow.md.
#
# SCAFFOLD BEHAVIOUR (AUDIT.md C1): the repo has no backend/ or frontend/ yet, so each
# job DETECTS its project and no-ops to green until the code exists — then the gates
# activate automatically. Jobs always run (never skipped) so they stay valid as required
# status checks for branch protection (AUDIT.md C2).
#
# TODO once code lands (tracked in development/AUDIT.md):
#   - OpenSearch service container + integration tests (testing.md layer 2)
#   - coverage ratchet: pytest --cov-fail-under + vitest thresholds (C3)
#   - FE/BE contract test: regenerate @hey-api/openapi-ts client, fail on git diff (I7)
#   - FE E2E smoke: Playwright against a built FE + seeded backend (testing.md §4, owned by M9f)
# Assumes: backend in ./backend and scanner in ./scanner (uv + pyproject.toml, pyright as a
#          dev dep), frontend in ./frontend (npm + package.json). Adjust paths if they differ.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    # AUDIT.md I12: conventional-commit types are load-bearing for release-please.
    # Validate every commit in the PR against commitlint.config.mjs. PR-only (commits on
    # main are already merged); merge commits are ignored by the action.
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read   # the action lists the PR's commits via the API
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      # Real OpenSearch so the ingest/bootstrap integration tests (golden round-trip) run in CI,
      # not just locally. Security off — dev/CI only. Image kept in sync with versions.yaml (D42).
      opensearch:
        image: opensearchproject/opensearch:3.7.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20 --health-start-period 40s
    steps:
      - uses: actions/checkout@v5

      - name: Detect backend
        id: detect
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend/pyproject.toml yet — skipping backend gates (scaffold)."
          fi

      - name: Set up uv
        if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv sync --all-extras --dev

      - name: Ruff lint
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run ruff format --check .

      - name: Pyright
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run pyright

      - name: Pytest
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run pytest

  scanner:
    name: Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect scanner
        id: detect
        run: |
          if [ -f scanner/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No scanner/pyproject.toml yet — skipping scanner gates (scaffold)."
          fi

      - name: Set up uv
        if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv sync --all-extras --dev

      - name: Ruff lint
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run ruff format --check .

      - name: Pyright
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run pyright

      - name: Pytest
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json yet — skipping frontend gates (scaffold)."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Test
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run test
