name: CI

# Quality gate for every PR + push to main: backend + scanner (ruff + pyright + pytest)
# and frontend (eslint + vitest), as required by development/standards/definition-of-done.md
# and git-workflow.md.
#
# DETECTION (AUDIT.md C1): each job DETECTS its project and no-ops to green when it's absent.
# Backend and scanner exist — their gates are ACTIVE (incl. the OpenSearch service container
# for integration tests). Frontend doesn't exist yet (M9x) — its job no-ops until it lands.
# Jobs always run (never skipped) so they stay valid as required status checks for branch
# protection (AUDIT.md C2).
#
# TODO still pending (tracked in development/AUDIT.md):
#   - coverage ratchet: pytest --cov-fail-under + vitest thresholds (C3)
#   - FE/BE contract test: regenerate @hey-api/openapi-ts client, fail on git diff (I7)
#   - FE E2E smoke: Playwright against a built FE + seeded backend (testing.md §4, owned by M9f)
# Layout: backend in ./backend, scanner in ./scanner (uv + pyproject.toml, pyright as a
#         dev dep), frontend in ./frontend (npm + package.json).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    # AUDIT.md I12: conventional-commit types are load-bearing for release-please.
    # Validate every commit in the PR against commitlint.config.mjs. PR-only (commits on
    # main are already merged); merge commits are ignored by the action.
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read   # the action lists the PR's commits via the API
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6

  common:
    name: javv-common (shared lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Read uv pin from versions.yaml (D42)
        id: uv
        run: echo "version=$(yq -r '.toolchain.uv' versions.yaml)" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true
      - name: Install dependencies
        working-directory: libs/javv-common
        run: uv sync --all-extras --dev
      - name: Ruff lint
        working-directory: libs/javv-common
        run: uv run ruff check .
      - name: Ruff format
        working-directory: libs/javv-common
        run: uv run ruff format --check .
      - name: Pyright
        working-directory: libs/javv-common
        run: uv run pyright
      - name: Pytest
        working-directory: libs/javv-common
        run: uv run pytest

  backend-static:
    # S-2 (#221): ruff+pyright split from pytest — no service container, starts instantly,
    # fails fast on lint-only mistakes, and runs CONCURRENTLY with the pytest job below.
    # Always-run (detect-step, never `if:`-skipped) so it stays valid for branch protection (C2).
    name: Backend static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect backend
        id: detect
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend/pyproject.toml yet — skipping backend gates (scaffold)."
          fi

      - name: Read uv pin from versions.yaml (D42)
        if: steps.detect.outputs.present == 'true'
        id: uv
        run: echo "version=$(yq -r '.toolchain.uv' versions.yaml)" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv sync --all-extras --dev

      - name: Ruff lint
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run ruff format --check .

      - name: Pyright
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv run pyright

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      # Real OpenSearch so the ingest/bootstrap integration tests (golden round-trip) run in CI,
      # not just locally. Security off — dev/CI only. Image kept in sync with versions.yaml (D42).
      opensearch:
        image: opensearchproject/opensearch:3.7.0
        env:
          discovery.type: single-node
          DISABLE_SECURITY_PLUGIN: "true"
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
          # fs snapshot repo root for the M2 restore drill — inside the data dir so it's writable
          # by the opensearch uid (a mounted volume would be root-owned). Matches the dev compose.
          path.repo: /usr/share/opensearch/data/snapshots
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 20 --health-start-period 40s
    steps:
      - uses: actions/checkout@v5

      - name: Detect backend
        id: detect
        run: |
          if [ -f backend/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No backend/pyproject.toml yet — skipping backend gates (scaffold)."
          fi

      - name: Read uv pin from versions.yaml (D42)
        if: steps.detect.outputs.present == 'true'
        id: uv
        run: echo "version=$(yq -r '.toolchain.uv' versions.yaml)" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        run: uv sync --all-extras --dev

      # ruff/pyright live in the parallel `backend-static` job (S-2, #221).
      # -n 2 (S-3): xdist across the 2 runner vCPUs — safe post-S-1 (session bootstrap;
      # tests use unique cluster_ids/usernames; prefix-isolated files stay isolated).
      # NOT in addopts — local single-process debugging stays the default.
      - name: Pytest
        if: steps.detect.outputs.present == 'true'
        working-directory: backend
        # store-exclusive tests (marker `serial`, e.g. the admin demote race that disables every
        # enabled admin) run AFTER the parallel pass, alone — under -n N they poison concurrent
        # tests' sessions (broke main 2026-07-07). A plain local `pytest` runs everything serially.
        run: |
          uv run pytest -n 2 -m "not serial"
          uv run pytest -m serial

  scanner:
    name: Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect scanner
        id: detect
        run: |
          if [ -f scanner/pyproject.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No scanner/pyproject.toml yet — skipping scanner gates (scaffold)."
          fi

      - name: Read uv pin from versions.yaml (D42)
        if: steps.detect.outputs.present == 'true'
        id: uv
        run: echo "version=$(yq -r '.toolchain.uv' versions.yaml)" >> "$GITHUB_OUTPUT"
      - name: Set up uv
        if: steps.detect.outputs.present == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv sync --all-extras --dev

      - name: Ruff lint
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run ruff format --check .

      - name: Pyright
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run pyright

      - name: Pytest
        if: steps.detect.outputs.present == 'true'
        working-directory: scanner
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json yet — skipping frontend gates (scaffold)."
          fi

      - name: Set up Node
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm ci

      - name: Lint
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run lint

      - name: Test
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: npm run test
