name: Scanner images

# M0b / D41: build the self-built, pinned scanner images across the compatible version matrix,
# gate each on the compatibility check (real binary → JAVV adapters), and publish the green ones
# to GHCR. The compatibility check runs on PRs touching the scanner; publish only on a tag or
# manual dispatch (deliberate releases). Versions come from versions.yaml (single source, D42).

on:
  pull_request:
    paths:
      - 'versions.yaml'
      - 'scanner/Dockerfile.*'
      - 'scanner/docker-bake.hcl'
      - 'scanner/src/scanner/adapters/**'
      - 'scanner/src/scanner/compat.py'
      - 'libs/**'
      - '.github/workflows/scanner-images.yml'
  workflow_dispatch:
  push:
    tags: ['scanner-v*']

permissions:
  contents: read

jobs:
  matrix:
    name: Resolve compatible versions
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          include=$(yq -o=json versions.yaml | jq -c \
            '[.scanners | to_entries[] | .key as $s
              | ([.value.current] + (.value.also_supported // []))[] | {scanner:$s, version:.}]')
          echo "include=$include" >> "$GITHUB_OUTPUT"
          echo "compatible-versions matrix: $include"

  compat:
    name: Compatibility ${{ matrix.scanner }} ${{ matrix.version }}
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - uses: actions/checkout@v5
      - name: Install trivy ${{ matrix.version }}
        if: matrix.scanner == 'trivy'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin "v${{ matrix.version }}"
      - name: Install grype ${{ matrix.version }}
        if: matrix.scanner == 'grype'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "v${{ matrix.version }}"
      - name: Read uv pin from versions.yaml (D42)
        id: uv
        run: echo "version=$(yq -r '.toolchain.uv' versions.yaml)" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv.outputs.version }}
          enable-cache: true
      - name: Install scanner package
        working-directory: scanner
        run: uv sync --all-extras --dev
      - name: Compatibility gate (real binary → JAVV adapters)
        working-directory: scanner
        run: uv run python -m scanner.compat --scanner "${{ matrix.scanner }}"

  lint-dockerfiles:
    name: Lint Dockerfiles (build --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: docker build --check (both scanner Dockerfiles)
        working-directory: scanner
        run: |
          docker build --check -f Dockerfile.trivy ..
          docker build --check -f Dockerfile.grype ..

  publish:
    name: Build + publish compatible images
    needs: [compat, lint-dockerfiles]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve registry + versions from the source of truth
        id: vars
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/$owner" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          json=$(yq -o=json versions.yaml)
          echo "trivy=$(echo "$json" | jq -r '([.scanners.trivy.current] + (.scanners.trivy.also_supported // [])) | join(",")')" >> "$GITHUB_OUTPUT"
          echo "grype=$(echo "$json" | jq -r '([.scanners.grype.current] + (.scanners.grype.also_supported // [])) | join(",")')" >> "$GITHUB_OUTPUT"
      # Build LOCALLY first (--load), smoke the actual image, and only push if the smoke passes —
      # a broken image never gets a public tag (M0b). --load needs single-platform (amd64), which we are.
      # --allow=fs.read=..: the bake context is the repo root (images need libs/javv-common);
      # buildx ≥0.17 (runner drift, 2026-07-07) enforces fs entitlements outside the bake-file dir
      - name: Bake the compatible matrix locally
        working-directory: scanner
        run: docker buildx bake --allow=fs.read=.. -f docker-bake.hcl --load
        env:
          REGISTRY: ${{ steps.vars.outputs.registry }}
          TRIVY_VERSIONS: ${{ steps.vars.outputs.trivy }}
          GRYPE_VERSIONS: ${{ steps.vars.outputs.grype }}
          GIT_SHA: ${{ steps.vars.outputs.sha }}

      # Publish-smoke (M0b DoD): run the *built* image's entrypoint end-to-end — this exercises the
      # image's real scanner binary + python package + wiring, which the compat gate (runner-side) does
      # NOT. `scanner.compat` drives the real binary and asserts a valid envelope. Runs BEFORE push.
      - name: Publish-smoke each built image
        env:
          REGISTRY: ${{ steps.vars.outputs.registry }}
        run: |
          json=$(yq -o=json versions.yaml)
          for scanner in trivy grype; do
            for v in $(echo "$json" | jq -r "([.scanners.$scanner.current] + (.scanners.$scanner.also_supported // []))[]"); do
              ref="$REGISTRY/javv-scanner-$scanner:$v"
              echo "::group::smoke $ref"
              # override the exec-form ENTRYPOINT (uv run … -m scanner) to run the compat check instead
              docker run --rm --entrypoint uv "$ref" \
                run --no-sync python -m scanner.compat --scanner "$scanner"
              echo "::endgroup::"
            done
          done

      - name: Push the smoked matrix
        working-directory: scanner
        run: docker buildx bake --allow=fs.read=.. -f docker-bake.hcl --push   # cache hit — just pushes the smoked layers
        env:
          REGISTRY: ${{ steps.vars.outputs.registry }}
          TRIVY_VERSIONS: ${{ steps.vars.outputs.trivy }}
          GRYPE_VERSIONS: ${{ steps.vars.outputs.grype }}
          GIT_SHA: ${{ steps.vars.outputs.sha }}

      # Supply-chain (M0b DoD): SBOM + a scan of our OWN published images. Report-only (never blocks the
      # publish); both are uploaded as a CI artifact. Signing (cosign) is deliberately deferred until the
      # repo/images are public — tracked on #60.
      - name: Install syft + grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh  | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: SBOM + self-scan (report-only)
        env:
          REGISTRY: ${{ steps.vars.outputs.registry }}
        run: |
          mkdir -p sbom scan
          json=$(yq -o=json versions.yaml)
          for scanner in trivy grype; do
            for v in $(echo "$json" | jq -r "([.scanners.$scanner.current] + (.scanners.$scanner.also_supported // []))[]"); do
              ref="$REGISTRY/javv-scanner-$scanner:$v"
              tag="$scanner-$v"
              echo "::group::SBOM + scan $ref"
              syft "$ref" -o spdx-json="sbom/$tag.spdx.json"
              grype "sbom:sbom/$tag.spdx.json" -o table -o "json=scan/$tag.grype.json" || true  # report-only
              echo "::endgroup::"
            done
          done

      - name: Upload SBOM + scan reports
        uses: actions/upload-artifact@v4
        with:
          name: scanner-image-provenance
          path: |
            sbom/
            scan/
