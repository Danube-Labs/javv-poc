# Seed workloads for the SECOND dev cluster (`k3d cluster create beta`, task: expanded
# two-cluster app behavior, 2026-07-16). Deliberately small — 3 namespaces, 4 workloads:
#
#   payments  — the SAME name and images as cluster alpha's payments namespace: the two
#               tenants share namespace names and image digests, so the app's cluster_id
#               scoping (facets, filters, all-clusters roll-up) is exercised where it can
#               actually confuse — identical labels, different tenant.
#   billing   — new name, not in alpha: redis:6.2.6 (small, known-vulnerable, layer-cached).
#   iot       — new name, not in alpha: memcached:1.6.9 (small, known-vulnerable).
#
#   kubectl --context k3d-beta apply -f development/setup/seed-beta-workloads.yaml
#
# Images that exit immediately run `sleep infinity` so pods stay Running for discovery.
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels: { javv.dev/purpose: scan-smoke-target }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-tomcat
  namespace: payments
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payments-tomcat }
  template:
    metadata:
      labels: { app: payments-tomcat }
    spec:
      containers:
        - name: tomcat
          image: tomcat:9.0.50-jdk11
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-wordpress
  namespace: payments
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payments-wordpress }
  template:
    metadata:
      labels: { app: payments-wordpress }
    spec:
      containers:
        - name: wordpress
          image: wordpress:5.8.1-php7.4-apache
          command: ["sleep", "infinity"]
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Namespace
metadata:
  name: billing
  labels: { javv.dev/purpose: scan-smoke-target }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-redis
  namespace: billing
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 1
  selector:
    matchLabels: { app: billing-redis }
  template:
    metadata:
      labels: { app: billing-redis }
    spec:
      containers:
        - name: redis
          image: redis:6.2.6
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Namespace
metadata:
  name: iot
  labels: { javv.dev/purpose: scan-smoke-target }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-memcached
  namespace: iot
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 1
  selector:
    matchLabels: { app: iot-memcached }
  template:
    metadata:
      labels: { app: iot-memcached }
    spec:
      containers:
        - name: memcached
          image: memcached:1.6.9
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 128Mi }
