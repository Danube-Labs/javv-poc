# JAVV dev smoke target — deliberately-old, known-vulnerable images to give the
# scanner something real to discover and scan in the local k3d cluster (`alpha`).
#
# NOT part of the app and NOT deployed anywhere real — this exists only to verify
# M0's scanner against a live cluster (PLAN §9 "Scanner: <local cluster> + a
# known-vulnerable image; confirm digest dedup …").
#
#   Apply:   kubectl apply -f development/setup/seed-vuln-workloads.yaml
#   Remove:  kubectl delete -f development/setup/seed-vuln-workloads.yaml
#
# What it proves once the scanner runs against it:
#   - discovery enumerates images across multiple namespaces/workloads
#   - digest-dedup: vuln-nginx has 3 replicas of ONE image → 3 pods collapse to 1 scan (D30)
#   - the trivy/grype adapters drive the real binaries on a real image and find real CVEs
#
# Images are intentionally old (CVE-rich). Tags are pinned; pull-once means all replicas
# share a digest, which is exactly what digest-dedup keys on. Bump deliberately if a tag
# ever stops resolving — the point is "old enough to have findings", not "latest".
#
# 2026-07-12 expansion (operator-approved, UI-validation breadth): four more namespaces —
# shop / data / ops / legacy — each workload exercising a specific path:
#   - shop:   httpd (dense deb CVEs) · node:16-slim (huge package count → table perf) ·
#             redis ×2 (replicas aggregation)
#   - data:   postgres · mysql:5.7 (EOL, critical-heavy) · minio (go-module ptype)
#   - ops:    grafana (alpine+go mix) · prometheus (go binaries)
#   - legacy: nginx:1.21.6 (SAME digest as javv-smoke → cross-namespace one-row roll-up) ·
#             python:3.9-slim (same repo as javv-smoke's python, different tag) ·
#             busybox (near-clean → the committed-clean zero-findings row)
# DB/storage images run `sleep infinity` — the scanner scans the IMAGE, not the process,
# and this avoids config-required crashloops at ~zero CPU.
---
apiVersion: v1
kind: Namespace
metadata:
  name: javv-smoke
  labels:
    javv.dev/purpose: scan-smoke-target
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-nginx
  namespace: javv-smoke
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 3                      # 3 pods, 1 image → digest-dedup must collapse to 1 scan
  selector:
    matchLabels: { app: vuln-nginx }
  template:
    metadata:
      labels: { app: vuln-nginx }
    spec:
      containers:
        - name: nginx
          image: nginx:1.21.6      # old; known CVEs
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-python
  namespace: javv-smoke
  labels: { javv.dev/purpose: scan-smoke-target }
spec:
  replicas: 1
  selector:
    matchLabels: { app: vuln-python }
  template:
    metadata:
      labels: { app: vuln-python }
    spec:
      containers:
        - name: python
          image: python:3.9.16-slim   # old; OS + interpreter CVEs
          command: ["sleep", "infinity"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits:   { cpu: 100m, memory: 64Mi }
---
