# Local DEV OpenSearch — single node, security DISABLED. NOT for production.
# JAVV's datastore for local dev + M1 integration tests. Pinned to the version the dev VM
# first ran; bump deliberately (keep in step with the target deploy version).
# Brings up http://localhost:9200 (+ :9600 metrics).
#
#   docker compose -f development/setup/opensearch-dev.yml up -d     # start
#   docker compose -f development/setup/opensearch-dev.yml down      # stop (keep data)
#   docker compose -f development/setup/opensearch-dev.yml down -v   # stop + wipe the data volume
#
# Equivalent throwaway one-liner (no persistence):
#   docker run -d --name javv-opensearch -p 9200:9200 -p 9600:9600 \
#     -e discovery.type=single-node -e DISABLE_SECURITY_PLUGIN=true \
#     -e "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" opensearchproject/opensearch:3.7.0
#
# Prereq: vm.max_map_count >= 262144  (sudo sysctl -w vm.max_map_count=262144)

services:
  opensearch:
    image: opensearchproject/opensearch:3.7.0
    container_name: javv-opensearch
    restart: unless-stopped  # survive VM crashes/reboots (2026-07-04 power cut left it Exited)
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true            # DEV ONLY — no TLS/auth on :9200
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m  # small heap for a dev VM
      # keep single-node health GREEN and crash-tolerant: JAVV does its own lifecycle (M4 job,
      # not the ISM plugin — PLAN D8) and doesn't use query-insights, but their internal indices
      # otherwise stick the cluster on yellow (.opendistro-ism-config wants a replica) or go red
      # after a hard crash (daily top_queries-* loses its primary). Also applied as persistent
      # cluster settings on the existing volume; these cover a fresh volume (down -v).
      - plugins.index_state_management.enabled=false
      - plugins.index_state_management.history.enabled=false
      - search.insights.top_queries.latency.enabled=false
      - search.insights.top_queries.cpu.enabled=false
      - search.insights.top_queries.memory.enabled=false
      # fs snapshot repo root (M2 restore drill). Inside the data dir so it's writable by the
      # opensearch uid (1000) without a chown dance; a mounted volume would be root-owned.
      - path.repo=/usr/share/opensearch/data/snapshots
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - javv-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  javv-opensearch-data:
